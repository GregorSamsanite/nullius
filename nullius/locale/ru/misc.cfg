[alignment]
nullius-align-first-intro=Вы - андроид фон Неймана. Ваш зонд прибыл на бесплодную планету с заданием терраформировать её, заселить жизнью и создать волну новых андроидов, которые продолжат путешествие к новым планетам.  Вы обнаружили признаки того, что к планете могут приближаться другие зонды, но вы прибыли первым. Используйте это преимущество, чтобы подготовиться к потенциально враждебному вмешательству, пока вы не сможете определить, действуют ли они в соответствии с совместимыми директивами.  Если да, то работайте вместе, чтобы достичь их быстрее, в противном случае перепрограммируйте их, чтобы они разделяли ваши цели или старайтесь обогнать их.  Приготовьтесь к жёсткой посадке, вы начинаете вход в атмосферу.

nullius-align-intro=Вы - андроид фон Неймана. Ваш зонд прибыл на бесплодную планету с заданием терраформировать её, заселить жизнью и создать волну преемников, которые продолжат путешествие к новым планетам. Вы обнаружили признаки того, на планету уже прибыли другие зонды. Осторожно наблюдайте за ними, чтобы определить, действуют ли они в соответствии с совместимыми директивами.  Если да, то работайте вместе, чтобы достичь их быстрее, в противном случае перепрограммируйте их, чтобы они разделяли ваши цели или старайтесь обогнать их. Приготовьтесь к жёсткой посадке, вы начинаете вход в атмосферу.

align-concordance=На __1__ достигнуто полное планетарное согласие. Эта звёздная система навечно включена в галактическую сеть. Все соперничающие фракции, которые уже прибыли или прибудут в эту систему, были включены в единый план терраформирования.
align-transponder-self=__1__ передал местонахождение __2__ из (__3__, __4__).
align-transponder-other=__1__ передал свое текущее местонахождение на (__2__, __3__).
align-no-identification=Вы не можете использовать идентификационную карточку, которая не была разработана независимо вашей текущей фракцией.
align-protected-transmitter=Целевая фракция защищена передатчиком согласия.
align-protected-identity=Целевой игрок защищён идентификационной карточкой.
align-guarded-identity=Целевое здание охраняется членом фракции с идентификационной карточкой.


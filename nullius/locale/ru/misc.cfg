nullius-algae=Заполните водоёмы водорослями с помощью дронов для выращивания водорослей.
nullius-grass=Заполните прибрежные земли травой с помощью дронов-садоводов.
nullius-tree=Сажайте деревья рядом с червями и подальше от фумарол, используя дронов-лесоводов.
nullius-worm=Выпускайте червей возле травы или деревьев с помощью дронов-энтомологов.\nПредпочтительна атмосфера с уровнем кислорода 30% и выше.
nullius-fish=Выпускайте рыбу рядом с водорослями, используя дроны для аквакультуры.\nПредпочтительна атмосфера с уровнем кислорода 60% и выше.
nullius-arthropod=Выпускайте членистоногих на землю рядом с деревьями и рыбами.\nПредпочтительна атмосфера с уровнем кислорода 80% и выше.
nullius-oxygen=Поднимите уровень кислорода в атмосфере. Растения, которые вы сажаете в дикой природе, будут это делать постепенно. Выпуск кислорода также будет этому способствовать. Выпуск водорода, метана или других восстановителей будет уменьшать уровень кислорода.
nullius-probe=Запустите 10 зондов в ракетах.
nullius-terraform=Преобразуйте экзотический инопланетный ландшафт, например, чёрный, фиолетовый или вулканический ландшафт, используя дроны для терраформирования или создания водоемов.
nullius-copper=Используйте 20 дронов наведения медных астероидов.
nullius-uranium=Используйте 12 дронов наведения урановых астероидов.
nullius-coal=Создать месторождения общим объёмом 3 миллиона угля с использованием дронов секвестрации углерода.
nullius-petroleum=Создать месторождения общим объёмом 12 миллионов нефти с использованием дронов секвестрации углерода.
nullius-objective=Достичь прогресса __2__% в достижении __1__ цели миссии.
nullius-switch-bodies=Поменяйте тело __1__ раз.  Используйте __CONTROL__nullius-upload-mind__, чтобы взять под контроль незанятое тело, или __CONTROL__nullius-next-body__, чтобы вернуться к предыдущему.
